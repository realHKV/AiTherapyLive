spring:
  application:
    name: AiTherapy

  # ─── Database ────────────────────────────────────────────────────────────────
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/therapyai}
    username: ${DATABASE_USER:therapyai_user}
    password: ${DATABASE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ─── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  # ─── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ─── Redis ───────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}    # Set to true in production (Upstash requires TLS)
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # ─── Security / OAuth2 ───────────────────────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-client-secret}
            scope: openid, email, profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
            user-name-attribute: sub

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt:
  private-key: ${JWT_PRIVATE_KEY:}         # RSA private key (PEM, base64 encoded)
  public-key: ${JWT_PUBLIC_KEY:}           # RSA public key (PEM, base64 encoded)
  access-token-expiry: 900                 # 15 minutes (seconds)
  refresh-token-expiry: 2592000            # 30 days (seconds)

# ─── Encryption ──────────────────────────────────────────────────────────────
encryption:
  master-key: ${ENCRYPTION_MASTER_KEY:}   # 32-byte base64 key — NEVER hardcode in production

# ─── AI Provider ─────────────────────────────────────────────────────────────
ai:
  provider:
    base-url: ${AI_BASE_URL:https://api.groq.com/openai/v1}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:llama-3.1-8b-instant}
    pro-base-url: ${AI_PRO_BASE_URL:${ai.provider.base-url}}
    pro-api-key: ${AI_PRO_API_KEY:${ai.provider.api-key}}
    pro-model: ${AI_PRO_MODEL:${ai.provider.model}}
    max-tokens: 512
    temperature: 0.75
  limits:
    messages-per-hour: 20
    context-messages: 20
    memory-items-in-prompt: 8
    system-prompt-max-tokens: 600

# ─── CORS ────────────────────────────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ─── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    com.hkv.AiTherapy: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"

# ─── Server ──────────────────────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always

# ─── Razorpay ────────────────────────────────────────────────────────────────────────────────
razorpay:
  key-id: ${RAZORPAY_KEY_ID:}            # rzp live/test key id
  key-secret: ${RAZORPAY_KEY_SECRET:}    # rzp live/test key secret
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}  # set in Razorpay dashboard → Webhooks

# ─── App flags ───────────────────────────────────────────────────────────────────────────────
app:
  dev-mode: ${DEV_MODE:false}   # set to true in .env to enable /dev/* endpoints
